<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Endless Plantation Runner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #5BA8D5; /* Realistic sky blue */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-text {
            position: absolute;
            color: white;
            font-size: 24px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            padding: 15px;
            letter-spacing: 1px;
        }
        #scoreDisplay { top: 10px; left: 10px; }
        #comboDisplay { 
            top: 50px; 
            left: 10px; 
            color: #FFD700; 
            display: none; 
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        #multiplierDisplay { top: 10px; right: 10px; color: #FFA500; }
        
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 45, 25, 0.85); /* Deep plantation green, glassy */
            backdrop-filter: blur(5px);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { margin: 0 0 5px 0; color: #8BC34A; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); font-size: 36px; }
        p { margin: 0; color: #E0E0E0; font-size: 16px; }
        button {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover { 
            background: linear-gradient(135deg, #66BB6A, #388E3C);
            transform: translateY(-2px); 
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(0,0,0,0.4); }
        
        #gameOverScreen, #countdownScreen { display: none; }
        
        #countdownText {
            font-size: 100px;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 4px 4px 10px rgba(0,0,0,0.8);
        }

        .controls-hint {
            margin-top: 10px;
            font-size: 15px;
            color: #BDBDBD;
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="uiLayer">
    <div id="scoreDisplay" class="hud-text">Score: 0</div>
    <div id="comboDisplay" class="hud-text">Combo x1</div>
    <div id="multiplierDisplay" class="hud-text"></div>

    <div id="startScreen" class="overlay">
        <h1>Plantation Runner</h1>
        <p>Drive the Harvester Tractor!</p>
        <button id="startBtn">Start Harvest</button>
        <div class="controls-hint">Swipe or use Arrow Keys to dodge.<br>Collect Fresh Fruit Bunches!</div>
    </div>
    
    <div id="countdownScreen" class="overlay" style="background: transparent; box-shadow: none; border: none; backdrop-filter: none;">
        <div id="countdownText">3</div>
    </div>

    <div id="gameOverScreen" class="overlay">
        <h1 style="color: #FF5252;">Harvest Over</h1>
        <p id="finalScoreText" style="font-size: 24px; font-weight: bold; color: #FFF;">Score: 0</p>
        <button id="restartBtn">Play Again</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer;
    let playerGroup, wheels = []; // Player is now a complex group (Tractor)
    let obstacles = [];
    let items = [];
    let scenery = []; // Background palm trees
    
    let gameState = 'START'; 
    let score = 0;
    let gameSpeed = 0.5;
    const baseSpeed = 0.5;
    let distance = 0;
    
    // Lane Configuration
    const laneWidth = 3;
    const leftLane = -laneWidth;
    const middleLane = 0;
    const rightLane = laneWidth;
    let currentLane = middleLane;
    
    // Player Animation & Easing
    let targetX = middleLane;
    const laneSwitchSpeed = 0.15; 
    let isJumping = false;
    let jumpVelocity = 0;
    const gravity = -0.018;
    const jumpPower = 0.35;
    let playerY = 0.8; // Raised for tractor base

    // Combo System
    let comboCount = 0;
    
    // UI Elements
    const scoreDisplay = document.getElementById('scoreDisplay');
    const comboDisplay = document.getElementById('comboDisplay');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const countdownScreen = document.getElementById('countdownScreen');
    const countdownText = document.getElementById('countdownText');
    const finalScoreText = document.getElementById('finalScoreText');
    
    // Realistic Color Palette
    const colors = {
        sky: 0x5BA8D5,
        ground: 0x3E6B27,     // Deep tropical grass
        path: 0x6E4C33,       // Dirt plantation road
        wood: 0x4A3320,       // Trunks/Logs
        leaf: 0x2A6B29,       // Palm leaves
        tractor: 0xDD2C00,    // Bright industrial orange/red for contrast
        tractorDark: 0x212121,
        fruit: 0xE64A19,      // Reddish-orange Fresh Fruit Bunch
        golden: 0xFFD700,
        coconut: 0x5D4037
    };

    // Shared Materials for performance
    const matWood = new THREE.MeshStandardMaterial({ color: colors.wood, roughness: 0.9, metalness: 0.1 });
    const matLeaf = new THREE.MeshStandardMaterial({ color: colors.leaf, roughness: 0.8, metalness: 0.1 });
    const matFruit = new THREE.MeshStandardMaterial({ color: colors.fruit, roughness: 0.6, metalness: 0.1 });
    const matGold = new THREE.MeshStandardMaterial({ color: colors.golden, roughness: 0.3, metalness: 0.8, emissive: 0x664400 });
    const matCoconut = new THREE.MeshStandardMaterial({ color: colors.coconut, roughness: 0.9, metalness: 0.0 });

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(colors.sky);
        scene.fog = new THREE.FogExp2(colors.sky, 0.015); // Exponential fog for realistic horizon blending

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 6, 12); // Slightly lower and closer for speed feel
        camera.lookAt(0, 1, -20);

        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Softer, realistic shadows

        // Realistic Lighting
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.5);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffebd6, 1.2); // Warm sunlight
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -30;
        dirLight.shadow.camera.right = 30;
        dirLight.shadow.camera.top = 30;
        dirLight.shadow.camera.bottom = -30;
        dirLight.shadow.camera.far = 100;
        dirLight.shadow.mapSize.width = 2048; // High-res shadows
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // Ground & Path
        const groundGeo = new THREE.PlaneGeometry(300, 300);
        const groundMat = new THREE.MeshStandardMaterial({ color: colors.ground, roughness: 1.0 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const pathGeo = new THREE.PlaneGeometry(laneWidth * 3.2, 300);
        const pathMat = new THREE.MeshStandardMaterial({ color: colors.path, roughness: 0.9 });
        const path = new THREE.Mesh(pathGeo, pathMat);
        path.rotation.x = -Math.PI / 2;
        path.position.y = 0.05;
        path.receiveShadow = true;
        scene.add(path);

        buildPlayerTractor();

        // Initial background scenery
        for(let i=0; i<10; i++) {
            spawnSceneryTree(-30 - (Math.random() * 80));
        }

        window.addEventListener('resize', onWindowResize, false);
        setupControls();
        animate();
    }

    function buildPlayerTractor() {
        playerGroup = new THREE.Group();
        
        const matBody = new THREE.MeshStandardMaterial({ color: colors.tractor, roughness: 0.6, metalness: 0.3 });
        const matDark = new THREE.MeshStandardMaterial({ color: colors.tractorDark, roughness: 0.8 });
        const matGlass = new THREE.MeshStandardMaterial({ color: 0x88CCFF, opacity: 0.6, transparent: true });

        // Main Base/Chassis
        const chassis = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.6, 3), matDark);
        chassis.position.y = 0.3;
        chassis.castShadow = true;
        playerGroup.add(chassis);

        // Engine Front
        const engine = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.8, 1.5), matBody);
        engine.position.set(0, 1.0, -0.6);
        engine.castShadow = true;
        playerGroup.add(engine);

        // Cabin
        const cabinBase = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.2, 1.2), matBody);
        cabinBase.position.set(0, 1.2, 0.8);
        cabinBase.castShadow = true;
        playerGroup.add(cabinBase);

        const cabinGlass = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.8, 1.3), matGlass);
        cabinGlass.position.set(0, 2.0, 0.8);
        playerGroup.add(cabinGlass);

        const roof = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.2, 1.6), matBody);
        roof.position.set(0, 2.5, 0.8);
        roof.castShadow = true;
        playerGroup.add(roof);

        // Exhaust pipe
        const exhaust = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1), matDark);
        exhaust.position.set(0.5, 1.8, -1.0);
        playerGroup.add(exhaust);

        // Wheels
        const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 16);
        wheelGeo.rotateZ(Math.PI / 2);
        
        const positions = [
            [-0.9, 0.5, -1.0], // Front Left
            [ 0.9, 0.5, -1.0], // Front Right
            [-0.9, 0.6,  1.0], // Back Left (Slightly larger)
            [ 0.9, 0.6,  1.0]  // Back Right
        ];

        positions.forEach((pos, idx) => {
            let w = new THREE.Mesh(idx > 1 ? new THREE.CylinderGeometry(0.7, 0.7, 0.5, 16).rotateZ(Math.PI/2) : wheelGeo, matDark);
            w.position.set(...pos);
            w.castShadow = true;
            playerGroup.add(w);
            wheels.push(w);
        });

        playerGroup.position.set(middleLane, playerY, 0);
        scene.add(playerGroup);
    }

    function spawnSceneryTree(zPos) {
        const tree = new THREE.Group();
        
        // Trunk
        const trunkGeo = new THREE.CylinderGeometry(0.3, 0.6, 8, 8);
        const trunk = new THREE.Mesh(trunkGeo, matWood);
        trunk.position.y = 4;
        // Slight organic tilt
        trunk.rotation.x = (Math.random() - 0.5) * 0.2;
        trunk.rotation.z = (Math.random() - 0.5) * 0.2;
        trunk.castShadow = true;
        tree.add(trunk);

        // Leaves/Fronds
        const leafCount = 7 + Math.floor(Math.random() * 4);
        for(let i = 0; i < leafCount; i++) {
            // Frond represented by a squashed, curved cone
            const frondGeo = new THREE.ConeGeometry(0.8, 5, 4);
            frondGeo.translate(0, 2.5, 0); // Move pivot to base
            const frond = new THREE.Mesh(frondGeo, matLeaf);
            
            frond.position.set(0, 7.5, 0);
            // Rotate outward radially
            frond.rotation.y = (i / leafCount) * Math.PI * 2;
            // Arc downwards
            frond.rotation.x = Math.PI / 3 + (Math.random() * 0.2);
            // Flatten to look leaf-like
            frond.scale.z = 0.2; 
            
            frond.castShadow = true;
            tree.add(frond);
        }

        // Place outside the main track lanes
        const isLeft = Math.random() > 0.5;
        const xOffset = (isLeft ? -1 : 1) * (7 + Math.random() * 8);
        
        tree.position.set(xOffset, 0, zPos);
        scene.add(tree);
        scenery.push(tree);
    }

    function setupControls() {
        let touchStartX = 0;
        let touchStartY = 0;

        window.addEventListener('keydown', (e) => {
            if (gameState !== 'PLAYING') return;
            if (e.key === 'ArrowLeft' && currentLane > leftLane) {
                currentLane -= laneWidth;
                targetX = currentLane;
            } else if (e.key === 'ArrowRight' && currentLane < rightLane) {
                currentLane += laneWidth;
                targetX = currentLane;
            } else if (e.key === 'ArrowUp' && !isJumping) {
                isJumping = true;
                jumpVelocity = jumpPower;
            }
        });

        window.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });

        window.addEventListener('touchend', (e) => {
            if (gameState !== 'PLAYING') return;
            let dx = e.changedTouches[0].screenX - touchStartX;
            let dy = e.changedTouches[0].screenY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30 && currentLane < rightLane) {
                    currentLane += laneWidth; targetX = currentLane;
                } else if (dx < -30 && currentLane > leftLane) {
                    currentLane -= laneWidth; targetX = currentLane;
                }
            } else {
                if (dy < -30 && !isJumping) {
                    isJumping = true; jumpVelocity = jumpPower;
                }
            }
        });
    }

    function startCountdown() {
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        countdownScreen.style.display = 'flex';
        gameState = 'COUNTDOWN';
        
        let count = 3;
        countdownText.innerText = count;
        
        const countInterval = setInterval(() => {
            count--;
            if (count > 0) {
                countdownText.innerText = count;
            } else if (count === 0) {
                countdownText.innerText = "GO!";
            } else {
                clearInterval(countInterval);
                countdownScreen.style.display = 'none';
                startGame();
            }
        }, 800);
    }

    function startGame() {
        score = 0;
        distance = 0;
        gameSpeed = baseSpeed;
        comboCount = 0;
        currentLane = middleLane;
        targetX = middleLane;
        playerGroup.position.set(middleLane, playerY, 0);
        isJumping = false;
        
        scoreDisplay.innerText = "Score: 0";
        comboDisplay.style.display = 'none';
        
        obstacles.forEach(obs => scene.remove(obs));
        items.forEach(item => {
            scene.remove(item.mesh);
            if(item.light) scene.remove(item.light);
        });
        obstacles = [];
        items = [];
        
        gameState = 'PLAYING';
    }

    function endGame() {
        gameState = 'GAMEOVER';
        finalScoreText.innerText = "Final Score: " + Math.floor(score);
        gameOverScreen.style.display = 'flex';
    }

    function animate() {
        requestAnimationFrame(animate);
        if (gameState === 'PLAYING') {
            update();
        }
        renderer.render(scene, camera);
    }

    let frameCount = 0;
    function update() {
        // Smooth lane switching
        playerGroup.position.x += (targetX - playerGroup.position.x) * laneSwitchSpeed;

        // Player Jump Physics
        if (isJumping) {
            playerGroup.position.y += jumpVelocity;
            jumpVelocity += gravity;
            if (playerGroup.position.y <= playerY) {
                playerGroup.position.y = playerY;
                isJumping = false;
                jumpVelocity = 0;
            }
        }

        // Animate Wheels
        wheels.forEach(w => w.rotation.x -= gameSpeed * 0.5);

        // Progression
        gameSpeed = baseSpeed + (distance / 4000); // Scale up difficulty
        distance += gameSpeed;
        score += gameSpeed * 0.1;
        scoreDisplay.innerText = "Score: " + Math.floor(score);

        // Dynamic Spawning
        frameCount++;
        if (frameCount % Math.max(20, Math.floor(60 - gameSpeed * 8)) === 0) {
            if (Math.random() < 0.6) spawnRealisticObstacle();
            else spawnRealisticItem();
        }
        
        // Spawn Background Trees occasionally
        if (frameCount % 10 === 0) {
            spawnSceneryTree(-120);
        }

        updateWorldObjects();
    }

    function updateWorldObjects() {
        // Tightened bounding box for the tractor for fair dodging
        const playerBox = new THREE.Box3().setFromObject(playerGroup).expandByScalar(-0.4);

        // Obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.position.z += gameSpeed;
            
            const obsBox = new THREE.Box3().setFromObject(obs).expandByScalar(-0.2); // Forgiving hitboxes
            if (playerBox.intersectsBox(obsBox)) {
                endGame();
                return; 
            }

            if (obs.position.z > 15) {
                scene.remove(obs);
                obstacles.splice(i, 1);
            }
        }

        // Items (Fruits)
        for (let i = items.length - 1; i >= 0; i--) {
            let itemObj = items[i];
            let itemMesh = itemObj.mesh;
            itemMesh.position.z += gameSpeed;
            
            // Bobbing & Rotating animation
            itemMesh.rotation.y += 0.05;
            itemMesh.position.y = 1 + Math.sin(frameCount * 0.1 + itemObj.seed) * 0.2;
            
            if(itemObj.light) {
                itemObj.light.position.copy(itemMesh.position);
            }
            
            const itemBox = new THREE.Box3().setFromObject(itemMesh);
            
            if (playerBox.intersectsBox(itemBox)) {
                comboCount++;
                score += itemObj.isGolden ? 10 : 1; 
                
                if (comboCount > 1) {
                    comboDisplay.style.display = 'block';
                    comboDisplay.innerText = "Combo x" + comboCount;
                    comboDisplay.style.transform = "scale(1.3)";
                    setTimeout(() => comboDisplay.style.transform = "scale(1)", 150);
                }
                
                scene.remove(itemMesh);
                if(itemObj.light) scene.remove(itemObj.light);
                items.splice(i, 1);
                continue;
            }

            // Missed item combo reset
            if (itemMesh.position.z > playerGroup.position.z + 3) {
                if (comboCount > 0) {
                    comboCount = 0;
                    comboDisplay.style.display = 'none';
                }
                scene.remove(itemMesh);
                if(itemObj.light) scene.remove(itemObj.light);
                items.splice(i, 1);
            }
        }

        // Scenery Trees Movement & Cleanup
        for (let i = scenery.length - 1; i >= 0; i--) {
            scenery[i].position.z += gameSpeed;
            if (scenery[i].position.z > 20) {
                scene.remove(scenery[i]);
                scenery.splice(i, 1);
            }
        }
    }

    function spawnRealisticObstacle() {
        const lanes = [leftLane, middleLane, rightLane];
        const lane = lanes[Math.floor(Math.random() * lanes.length)];
        const type = Math.random();
        
        let mesh;
        if (type < 0.35) {
            // Realistic Log
            const geo = new THREE.CylinderGeometry(0.6, 0.6, 3, 12);
            mesh = new THREE.Mesh(geo, matWood);
            mesh.rotation.z = Math.PI / 2; // Lay flat
            mesh.position.set(lane, 0.6, -100);
        } else if (type < 0.70) {
            // Large Fallen Frond / Wood blockade
            const geo = new THREE.BoxGeometry(0.4, 2.5, 0.6);
            mesh = new THREE.Mesh(geo, matWood);
            mesh.position.set(lane, 1.25, -100);
        } else {
            // Clustered Coconuts
            mesh = new THREE.Group();
            const cGeo = new THREE.SphereGeometry(0.5, 12, 12);
            const positions = [[0,0,0], [0.6,0,-0.4], [-0.4,0,-0.5]];
            positions.forEach(p => {
                let c = new THREE.Mesh(cGeo, matCoconut);
                c.position.set(...p);
                c.castShadow = true; c.receiveShadow = true;
                mesh.add(c);
            });
            mesh.position.set(lane, 0.5, -100);
        }
        
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        obstacles.push(mesh);
    }

    function spawnRealisticItem() {
        const lanes = [leftLane, middleLane, rightLane];
        const lane = lanes[Math.floor(Math.random() * lanes.length)];
        const isGolden = Math.random() < 0.15; 
        
        // Realistic Fresh Fruit Bunch (FFB) - Cluster of spheres
        const bunch = new THREE.Group();
        const baseGeo = new THREE.SphereGeometry(0.3, 8, 8);
        const material = isGolden ? matGold : matFruit;
        
        // Center core
        bunch.add(new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), material));
        // Lumpy outer fruits
        const fruitPos = [[0.3,0.2,0], [-0.3,0.2,0], [0,0.2,0.3], [0,0.2,-0.3], [0,0.5,0]];
        fruitPos.forEach(p => {
            let f = new THREE.Mesh(baseGeo, material);
            f.position.set(...p);
            bunch.add(f);
        });

        bunch.position.set(lane, 1.2, -100);
        bunch.traverse(child => child.castShadow = true);
        
        let light = null;
        if (isGolden) {
            light = new THREE.PointLight(0xFFD700, 1.5, 5);
            light.position.copy(bunch.position);
            scene.add(light);
        }

        scene.add(bunch);
        items.push({ mesh: bunch, isGolden, seed: Math.random() * 10, light }); 
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Attach countdown to buttons
    document.getElementById('startBtn').addEventListener('click', startCountdown);
    document.getElementById('restartBtn').addEventListener('click', startCountdown);

    // Boot game
    window.onload = init;
</script>
</body>
</html>
